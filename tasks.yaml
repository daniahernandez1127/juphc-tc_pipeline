apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: npm-install-task
spec:
  steps:
    - name: install
      image: node:16
      script: |
        #!/bin/sh
        npm install

---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: jasmine-tests-task
spec:
  steps:
    - name: run-tests
      image: node:16
      script: |
        #!/bin/sh
        npx jasmine
